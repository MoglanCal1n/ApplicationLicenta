version: '3.8'

services:
  db:
    image: postgres:15
    container_name: licenta_postgres
    restart: always
    environment:
      POSTGRES_USER: licenta_user
      POSTGRES_PASSWORD: parola_secreta_123
      POSTGRES_DB: licenta_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  api:
    build: .
    container_name: licenta_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/app

  frontend:
    build: ../Frontend
    container_name: licenta_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ../Frontend:/app
      - /app/node_modules # Prevent host from overwriting container's node_modules
      
volumes:
  postgres_data: